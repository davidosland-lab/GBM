name: Local Verification

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip
          python -m pip install --no-build-isolation --no-compile -e ".[dev]"

      - name: Run canonical local verification
        run: gbmbert-verify-local

      - name: Run strict training governance audit
        run: gbmbert-run-strict-training-governance --output-dir reports/training/governance_strict --allow-findings

      - name: Build CI report summary
        if: always()
        run: |
          gbmbert-review-gold-pack-promotion --markdown-output reports/training/gold_pack/gold_pack_promotion_review.md --json-output reports/training/gold_pack/gold_pack_promotion_review.json --allow-blockers
          gbmbert-ci-report-summary --output reports/platform_regression/ci_report_summary.md
          cat reports/platform_regression/ci_report_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gbm-verification-reports
          path: |
            reports/platform_regression/*.json
            reports/platform_regression/*.md
            reports/training/governance/*.json
            reports/training/governance/*.md
            reports/training/governance_strict/*.json
            reports/training/governance_strict/*.md
            reports/training/gold_pack/gold_pack_promotion_review.*
          if-no-files-found: warn
